<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>狗狗 MBTI 测试 - Canine Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
        body { background: #050505; }
        .progress-bar { transition: width 0.3s ease; }
        .option-btn { transition: all 0.2s ease; }
        .option-btn:hover { transform: translateY(-2px); }
        /* MODIFIED: 2026-03-23 - Phase 2 选项高亮 */
        .option-btn.selected {
            ring: 2px solid #34d399;
            background: rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.5);
        }
    </style>
</head>
<body class="bg-[#050505] text-neutral-300 font-sans antialiased min-h-screen">
    <!-- Loading Animation -->
    <div id="loading" class="fixed inset-0 bg-[#050505] z-50 flex items-center justify-center">
        <div class="text-center">
            <div class="font-mono text-emerald-400 text-sm mb-4">Loading System Modules...</div>
            <div class="w-64 h-1 bg-neutral-800 rounded">
                <div class="h-full bg-emerald-500 rounded progress-bar" style="width: 0%" id="load-progress"></div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="app" class="hidden">
        <!-- Header -->
        <header class="flex items-center justify-between px-6 py-4 border-b border-neutral-800">
            <div class="flex items-center gap-2">
                <iconify-icon icon="solar:bone-linear" width="24" class="text-emerald-400"></iconify-icon>
                <span class="text-sm font-medium tracking-tighter text-white uppercase">Canine Protocol</span>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="switchLanguage()" class="text-xs text-neutral-500 hover:text-white border border-neutral-700 px-3 py-1 rounded-full hover:border-neutral-500 transition-all" id="lang-btn">EN</button>
                <span class="text-xs font-mono text-neutral-600">
                    <span id="question-counter">1/15</span>
                </span>
            </div>
        </header>

        <!-- Progress Bar -->
        <div class="w-full h-1 bg-neutral-800">
            <div class="h-full bg-emerald-500 progress-bar" style="width: 6.66%" id="progress"></div>
        </div>

        <!-- Question Container -->
        <main class="max-w-2xl mx-auto px-6 py-12">
            <div id="question-container">
                <h2 id="question-text" class="text-2xl font-medium text-white mb-8"></h2>
                <div id="options-container" class="space-y-3"></div>
                
                <!-- Navigation Buttons -->
                <div class="flex justify-between mt-8">
                    <button id="prev-btn" onclick="prevQuestion()" class="px-6 py-2 rounded-lg border border-neutral-700 text-neutral-400 hover:text-white hover:border-neutral-500 transition-all disabled:opacity-30 disabled:cursor-not-allowed" disabled>← Previous</button>
                    <span class="text-xs text-neutral-600 font-mono" data-i18n="question_progress">Question <span id="q-num">1</span> of <span id="q-total">15</span></span>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Language switch
        function getLanguage() {
            const params = new URLSearchParams(window.location.search);
            return params.get('lang') || 'zh';
        }
        function switchLanguage() {
            const lang = getLanguage() === 'zh' ? 'en' : 'zh';
            const url = new URL(window.location.href);
            url.searchParams.set('lang', lang);
            window.location.href = url.toString();
        }
        function updateLangButton() {
            const lang = getLanguage();
            document.getElementById('lang-btn').textContent = lang === 'zh' ? 'EN' : '中文';
            document.documentElement.lang = lang === 'en' ? 'en' : 'zh-CN';
        }

        // Loading animation - 数据加载完成后才完成
        let loadProgress = 0;
        let dataLoaded = false;
        const loadInterval = setInterval(() => {
            // 数据加载前，进度条缓慢增长到 80%
            if (!dataLoaded && loadProgress < 80) {
                loadProgress += Math.random() * 15;
            }
            // 数据加载完成后，快速完成
            if (dataLoaded && loadProgress < 100) {
                loadProgress += 20;
            }
            if (loadProgress >= 100) {
                loadProgress = 100;
                clearInterval(loadInterval);
                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                }, 200);
            }
            document.getElementById('load-progress').style.width = Math.min(loadProgress, 100) + '%';
        }, 100);

        function finishLoading() {
            dataLoaded = true;
        }

        // Questions data
        let questions = [];
        let currentQuestion = 0;
        let scores = { E: 0, I: 0, N: 0, S: 0, F: 0, T: 0, J: 0, P: 0 };
        let userAnswers = []; // Store user answers

        // Load questions based on language
        const lang = getLanguage();
        const questionsFile = lang === 'en' ? 'questions.en.json' : 'questions.json';

        updateLangButton();

        // 添加时间戳防止缓存
        fetch(questionsFile + '?t=' + Date.now())
            .then(r => {
                if (!r.ok) throw new Error('Network response was not ok');
                return r.json();
            })
            .then(data => {
                questions = data;
                showQuestion();
                finishLoading();
            })
            .catch(err => {
                console.error('Failed to load questions:', err);
                document.getElementById('loading').innerHTML = `
                    <div class="text-center">
                        <div class="text-red-400 text-lg mb-4">加载失败</div>
                        <div class="text-neutral-500 text-sm mb-4">请刷新页面重试</div>
                        <button onclick="location.reload()" class="px-4 py-2 bg-neutral-800 rounded-lg text-white">刷新</button>
                    </div>
                `;
            });

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question-text').textContent = q.question;
            document.getElementById('question-counter').textContent = `${currentQuestion + 1}/${questions.length}`;
            document.getElementById('progress').style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;
            document.getElementById('q-num').textContent = currentQuestion + 1;
            document.getElementById('q-total').textContent = questions.length;

            // Update Previous button state
            const prevBtn = document.getElementById('prev-btn');
            prevBtn.disabled = (currentQuestion === 0);

            const container = document.getElementById('options-container');
            container.innerHTML = '';

            // 获取当前题目已选答案的索引
            const selectedAnswer = userAnswers[currentQuestion];
            const selectedIndex = selectedAnswer ? selectedAnswer.index : -1;

            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                // MODIFIED: 2026-03-23 - Phase 5 "不确定"选项使用特殊样式
                const isSelected = i === selectedIndex;
                const isUncertain = Object.keys(opt.score).length === 0;

                if (isUncertain) {
                    // "不确定"选项使用灰色虚线边框样式
                    btn.className = `option-btn w-full p-4 rounded-xl bg-neutral-900/30 border text-left transition-all ${
                        isSelected
                            ? 'bg-neutral-800/50 border-neutral-500 text-neutral-300 ring-2 ring-neutral-600'
                            : 'border-neutral-700 border-dashed hover:bg-neutral-800/30 hover:border-neutral-600 text-neutral-500'
                    }`;
                } else {
                    // 正常选项
                    btn.className = `option-btn w-full p-4 rounded-xl bg-neutral-900/50 border text-left transition-all ${
                        isSelected
                            ? 'bg-emerald-900/30 border-emerald-500 text-white'
                            : 'border-neutral-800 hover:bg-neutral-800/50 hover:border-emerald-500/50'
                    }`;
                    // MODIFIED: 2026-03-23 - Phase 2 恢复已选答案高亮
                    if (userAnswers[currentQuestion] && userAnswers[currentQuestion].index === i) {
                        btn.classList.add('ring-2', 'ring-emerald-500', 'bg-emerald-500/10', 'border-emerald-500/50');
                    }
                }
                btn.innerHTML = `<span class="text-neutral-500 mr-3">${String.fromCharCode(65 + i)}.</span>${opt.text}`;
                btn.onclick = () => selectOption(opt.score, i);
                container.appendChild(btn);
            });
        }

        // MODIFIED: 2026-03-23 - Phase 5 支持"不确定"选项
        function selectOption(score, index) {
            // 如果当前题目已有答案，先减去旧分数
            const oldAnswer = userAnswers[currentQuestion];
            if (oldAnswer && !oldAnswer.skipped) {
                for (const [dim, val] of Object.entries(oldAnswer.score)) {
                    scores[dim] -= val;
                }
            }

            // 判断是否为"不确定"选项（score 为空对象）
            const isSkipped = Object.keys(score).length === 0;

            // 存储新答案
            userAnswers[currentQuestion] = { score, index, skipped: isSkipped };

            // 只有非跳过的选项才计入分数
            if (!isSkipped) {
                for (const [dim, val] of Object.entries(score)) {
                    scores[dim] += val;
                }
            }

            currentQuestion++;
            if (currentQuestion >= questions.length) {
                // Calculate result
                const result = calculateMBTI();
                // Redirect to result page with language parameter
                const lang = getLanguage();
                window.location.href = `../result.html?type=${result}&species=dog&lang=${lang}`;
            } else {
                showQuestion();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion();
            }
        }

        // MODIFIED: 2026-03-23 - Phase 5 支持部分跳过时的计算
        function calculateMBTI() {
            // 如果某个维度全部被跳过（分数都是0），使用默认值
            const e_i = scores.E >= scores.I ? 'E' : 'I';
            const n_s = scores.N >= scores.S ? 'N' : 'S';
            const f_t = scores.F >= scores.T ? 'F' : 'T';
            const j_p = scores.J >= scores.P ? 'J' : 'P';
            return e_i + n_s + f_t + j_p;
        }
    </script>
</body></html>
